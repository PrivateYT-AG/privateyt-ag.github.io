<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="The official site for PrivateYT-AG">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/fonts/inter.css">
  <script src="https://kit.fontawesome.com/b2bfce1cfe.js" crossorigin="anonymous"></script>
  <title>PrivateYT-AG</title>
</head>
<body>
  <header>
    <div class="left-side">
      <a href="/" class="logo-text">PrivateYT-AG</a>
    </div>
    <div class="right-side">
      <button type="button" class="showModal" data-dialog="search" disabled>
        <i class="icon-btn fa-solid fa-magnifying-glass"></i>
      </button>
      <div class="dropdown-container">
        <button type="button" class="dropdown-btn">Theme</button>
        <ul class="dropdown-menu">
          <li><button type="button" id="light-mode-btn">Light</button></li>
          <li><button type="button" id="dark-mode-btn">Dark</button></li>
          <li><button type="button" id="oled-dark-btn">OLED Dark</button></li>
          <li><button type="button" id="system-theme-btn">System</button></li>
        </ul>
      </div>
    </div>
  </header>
  <main>
    <h1 class="home-page-header">Welcome!</h1>
    <span id="splash-text" aria-hidden="true">&nbsp;</span>
    <p>Someone that codes</p>
    <p>Consider checking my projects:</p>
    <ul>
      <li><a href="/tools/star-diameter-calculator/">Star diameter calculator</a></li>
    </ul>
  </main>
  <footer>
    <span>Developed by PrivateYT-AG</span>
  </footer>
  <dialog id="search">
    <div class="dialog-header">
      <i class="dialog-icon fa-solid fa-magnifying-glass"></i>
      <h2>Search</h2>
      <button type="button" class="close-x closeModal" aria-label="Close">✕</button>
    </div>
    <div class="dialog-content">
      <search>
        <form action="/search" method="get">
          <input type="search" placeholder="Search..." name="q" id="site-search">
          <button type="submit" id="search">Search</button>
        </form>
      </search>
    </div>
  </dialog>
  <script src="/script.js"></script>
</body>
</html>
